<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product Data</title>
</head>
<body>
      <h1>Enter Product Details</h1>
      <form action="SaveServlet" method ="post">
            Product ID:<input type="number" name="p_id"><br><br>
            Product Name:<input type="text" name="p_name"><br><br>
            Price:<input type="number" step="0.01" name="price"><br><br>
            Quality:<select name="quality" style="width:150px">
                    <option>Excellent</option>
                    <option>Good</option>
                    <option>Average</option>
                    <option>Bad</option>
            </select><br><br>
            <input type="submit" value="Save Product">
      </form><br>
      <a href="ViewServlet">View Products</a>
</body>
</html>
