<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Form</title>
</head>
<body>
      <h2>Get Request</h2>
      <form action="ParameterServlet" method="get">
          Name: <input type="text" name="username"><br>
          <input type="submit" value="Submit">
      </form>
      
      <h2>Post Request</h2>
      <form action="ParameterServlet" method ="post">
         Name: <input type="text" name="username"><br>
         Password: <input type="text" name="userpass"><br>
         <input type="submit" value="Submit">
      </form>
</body>
</html>
